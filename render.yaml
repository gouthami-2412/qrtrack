services:
  - type: web
    name: qrtrack
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: qrtrack-db
          property: connectionString

databases:
  - name: qrtrack-db
    databaseName: qrtrack
    user: qrtrack
