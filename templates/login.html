<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – QRTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --surface: #111827; --border: #1f3044;
    --accent: #00d4ff; --text: #e2e8f0; --muted: #64748b;
    --red: #ef4444; --green: #10b981;
    --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    top: -200px; left: -200px;
    border-radius: 50%;
  }
  body::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    border-radius: 50%;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }
  .brand { text-align: center; margin-bottom: 36px; }
  .brand-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #00d4ff, #7c3aed);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 16px;
  }
  h1 { font-family: var(--mono); font-size: 20px; color: var(--accent); letter-spacing: 0.05em; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 7px; letter-spacing: 0.08em; }
  input {
    width: 100%; padding: 11px 14px;
    background: #0a0f1e; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-size: 14px; font-family: var(--sans);
    outline: none; transition: border 0.15s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  .btn-login {
    width: 100%; padding: 12px;
    background: var(--accent); color: #0a0f1e;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: var(--mono);
    letter-spacing: 0.05em;
    transition: filter 0.15s;
  }
  .btn-login:hover { filter: brightness(1.1); }
  .hint {
    margin-top: 24px; padding: 12px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.1);
    border-radius: 8px;
    font-size: 12px; color: var(--muted);
    font-family: var(--mono);
  }
  .hint strong { color: var(--accent); }
  .flash {
    padding: 10px 14px; border-radius: 8px; margin-bottom: 20px;
    font-size: 13px; background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3); color: var(--red);
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="brand-icon">📂</div>
    <h1>QRTRACK</h1>
    <div class="subtitle">QR-Based Physical File Tracking System</div>
  </div>

  {% for cat, msg in get_flashed_messages(with_categories=True) %}
    <div class="flash">{{ msg }}</div>
  {% endfor %}

  <form method="POST">
    <div class="form-group">
      <label>USERNAME</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">SIGN IN →</button>
  </form>
  
  <div style="margin-top:18px;text-align:center;font-size:13px;color:var(--muted)">
  New user?
  <a href="/signup" style="color:var(--accent);text-decoration:none;font-weight:600">
    Create an account
  </a>
  </div>


  <!-- <div class="hint">
    Default admin: <strong>admin</strong> / <strong>admin123</strong>
  </div> -->
</div>
</body>
</html>
